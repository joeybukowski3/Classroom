<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Grade Blending Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --sidebar-bg: #ffffff;
            --tray-bg: #e2e8f0;
            --vowel-color: #ff6b6b;
            --consonant-color: #9bf6ff;
            --digraph-color: #caffbf;
            --vowel-team-color: #ffadad;
            --r-controlled-color: #fdffb6;
            --other-color: #ffffff;
            --text-color: #2d3748;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --tile-shadow: 0 6px 0 rgba(0,0,0,0.15);
            --dot-color: #4a5568;
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --sidebar-bg: #2d3748;
            --tray-bg: #4a5568;
            --text-color: #f7fafc;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --tile-shadow: 0 6px 0 rgba(0,0,0,0.4);
            --dot-color: #cbd5e0;
            --other-color: #2d3748;
        }

        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* =================== TAB NAV =================== */
        #tab-nav {
            display: flex;
            gap: 4px;
            padding: 8px 16px 0;
            background: var(--sidebar-bg);
            border-bottom: 3px solid var(--tray-bg);
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            z-index: 10;
        }

        .tab-btn {
            padding: 10px 24px;
            border: 3px solid transparent;
            border-radius: 10px 10px 0 0;
            font-family: 'Lexend', sans-serif;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            background: var(--tray-bg);
            color: var(--text-color);
            transition: background 0.2s;
            position: relative;
            bottom: -3px;
        }

        .tab-btn.active {
            background: var(--bg-color);
            border-color: var(--tray-bg);
            border-bottom-color: var(--bg-color);
            z-index: 1;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(0,0,0,0.08);
        }

        /* =================== TAB PANELS =================== */
        .tab-panel {
            display: none;
            flex: 1;
            min-height: 0;
        }

        .tab-panel.active {
            display: flex;
        }

        #tab-blending {
            flex-direction: row;
            overflow: hidden;
        }

        #tab-pezzello {
            flex-direction: column;
            overflow-y: auto;
            background: #eceff1;
        }

        /* =================== EXISTING BLENDING BOARD STYLES =================== */

        /* Sidebar */
        #sidebar {
            width: 220px;
            background: var(--sidebar-bg);
            border-right: 4px solid var(--tray-bg);
            display: flex;
            flex-direction: column;
            padding: 15px 10px;
            gap: 10px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .category-btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            text-align: left;
            box-shadow: var(--shadow);
            color: #2d3748;
        }

        .category-btn:active { transform: translateY(2px); box-shadow: none; }
        .cat-consonants { background-color: var(--consonant-color); }
        .cat-vowels { background-color: var(--vowel-color); color: white; }
        .cat-digraphs { background-color: var(--digraph-color); }
        .cat-vowel-teams { background-color: var(--vowel-team-color); }
        .cat-r-controlled { background-color: var(--r-controlled-color); }
        .cat-other { background-color: var(--other-color); border: 2px solid #cbd5e0; color: var(--text-color); }

        /* Main Content */
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            min-width: 0;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        /* Word Section */
        #word-section {
            height: 220px;
            background: var(--sidebar-bg);
            border-radius: 20px;
            border: 4px dashed #cbd5e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
            box-shadow: var(--shadow);
        }

        .tile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .blending-dot {
            width: 15px;
            height: 15px;
            background-color: var(--dot-color);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .show-dots .blending-dot { opacity: 1; }

        /* Controls */
        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
        }

        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            color: #2d3748;
        }

        .btn-sound-out { background: #fdffb6; border: 3px solid #f0e68c; }
        .btn-read-word { background: #9bf6ff; border: 3px solid #81e6f1; }
        .btn-clear { background: #ffadad; border: 3px solid #ff8d8d; }
        .btn-challenge { background: #caffbf; border: 3px solid #95d5b2; }
        .btn-toggle { background: var(--tray-bg); color: var(--text-color); border: 2px solid #cbd5e0; }

        /* Tray Area */
        #tray-area {
            flex: 1;
            background: var(--tray-bg);
            border-radius: 20px;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
            overflow-y: auto;
            align-content: start;
        }

        /* Tiles */
        .tile {
            width: 90px;
            height: 100px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-shadow: var(--tile-shadow);
            transition: transform 0.1s;
            position: relative;
            color: #2d3748;
        }

        .tile:hover { transform: translateY(-2px); }
        .tile:active { transform: translateY(4px); box-shadow: none; }

        .tile[data-type="vowel"] { border: 4px solid var(--vowel-color); }
        .tile[data-type="consonant"] { border: 4px solid var(--consonant-color); }
        .tile[data-type="digraph"] { border: 4px solid var(--digraph-color); }
        .tile[data-type="vowel-team"] { border: 4px solid var(--vowel-team-color); }
        .tile[data-type="r-controlled"] { border: 4px solid var(--r-controlled-color); }
        .tile[data-type="other"] { border: 4px solid #cbd5e0; }

        /* History Drawer */
        #history-drawer {
            width: 250px;
            background: var(--sidebar-bg);
            border-left: 4px solid var(--tray-bg);
            transition: transform 0.3s ease;
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #history-drawer.collapsed {
            transform: translateX(100%);
            width: 0;
            padding: 0;
        }

        .toggle-history {
            position: absolute;
            left: -45px;
            top: 20px;
            width: 45px;
            height: 45px;
            background: var(--tray-bg);
            border: none;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-color);
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .history-item:hover { background: rgba(0,0,0,0.05); }

        /* Settings */
        .settings-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        select {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--tray-bg);
            font-family: inherit;
            background: var(--sidebar-bg);
            color: var(--text-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar { width: 160px; }
            .tile { width: 70px; height: 80px; font-size: 1.5rem; }
            .action-btn { padding: 10px 15px; font-size: 0.9rem; }
            #word-section { height: 160px; }
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-tile {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Sidebar Control Styles */
        .control-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .control-label:hover {
            background: rgba(0,0,0,0.05);
        }
        .cat-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #4a5568;
        }

        /* =================== PEZZELLO TAB STYLES =================== */

        .pez-board {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 20px;
            max-width: 1160px;
            width: 100%;
            margin: 20px auto;
            box-sizing: border-box;
            box-shadow: 0 6px 30px rgba(0,0,0,0.12);
        }

        .pez-left-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pez-right-col {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .pez-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .pez-label {
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 0 2px 2px;
        }

        .pez-label-digraph    { color: #2e7d32; }
        .pez-label-rcontrol   { color: #e65100; }
        .pez-label-vowelteam  { color: #ad1457; }
        .pez-label-other      { color: #1a1a1a; }
        .pez-label-cv         { color: #1565c0; font-size: 0.75rem; }

        .pez-tiles-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        /* Base tile */
        .pez-tile {
            min-width: 52px;
            height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            border: none;
            padding: 0 9px;
            color: #1a1a1a;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        .pez-tile:hover  { transform: translateY(-2px); }
        .pez-tile:active { transform: scale(0.91) translateY(2px); }

        /* Tile color variants */
        .pez-t-digraph {
            background: #AEEA00;
            box-shadow: 0 4px 0 #7aaa00;
        }
        .pez-t-digraph:hover  { box-shadow: 0 6px 0 #7aaa00; }
        .pez-t-digraph:active { box-shadow: 0 1px 0 #7aaa00; }

        .pez-t-rcontrol {
            background: #FFD600;
            box-shadow: 0 4px 0 #c4a600;
        }
        .pez-t-rcontrol:hover  { box-shadow: 0 6px 0 #c4a600; }
        .pez-t-rcontrol:active { box-shadow: 0 1px 0 #c4a600; }

        .pez-t-vowelteam {
            background: #E91E8C;
            color: #fff;
            box-shadow: 0 4px 0 #a01260;
        }
        .pez-t-vowelteam:hover  { box-shadow: 0 6px 0 #a01260; }
        .pez-t-vowelteam:active { box-shadow: 0 1px 0 #a01260; }

        .pez-t-other {
            background: #ffffff;
            border: 2px solid #1a1a1a;
            box-shadow: 0 4px 0 #555;
        }
        .pez-t-other:hover  { box-shadow: 0 6px 0 #555; }
        .pez-t-other:active { box-shadow: 0 1px 0 #555; }

        .pez-t-vowel {
            background: #D32F2F;
            color: #fff;
            box-shadow: 0 4px 0 #8c1c1c;
        }
        .pez-t-vowel:hover  { box-shadow: 0 6px 0 #8c1c1c; }
        .pez-t-vowel:active { box-shadow: 0 1px 0 #8c1c1c; }

        .pez-t-consonant {
            background: #29B6F6;
            box-shadow: 0 4px 0 #0277a8;
        }
        .pez-t-consonant:hover  { box-shadow: 0 6px 0 #0277a8; }
        .pez-t-consonant:active { box-shadow: 0 1px 0 #0277a8; }

        /* My Word Builder */
        .pez-my-word {
            background: #f0f4f8;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pez-my-word-label {
            font-weight: 800;
            font-size: 1rem;
            color: #2d3748;
        }

        .pez-boxes-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pez-box {
            width: 50px;
            height: 50px;
            border: 2px solid #aab;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            background: #fff;
            color: #1a1a1a;
            transition: border-color 0.15s, background 0.15s;
            cursor: default;
        }

        .pez-box.filled {
            border-color: #444;
            background: #fffde7;
        }

        .pez-arrow-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pez-arrow {
            font-size: 1.6rem;
            color: #666;
            line-height: 1;
        }

        .pez-word-display {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.7rem;
            color: #1a1a1a;
            letter-spacing: 3px;
            min-height: 2.2rem;
        }

        .pez-phonetic-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            color: #7b6c00;
            letter-spacing: 1.5px;
            min-height: 1.1rem;
        }

        .pez-clear-btn {
            align-self: flex-start;
            padding: 7px 18px;
            background: #ffadad;
            border: 2px solid #ff7070;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: transform 0.1s;
            color: #5a1a1a;
        }
        .pez-clear-btn:hover  { transform: translateY(-1px); }
        .pez-clear-btn:active { transform: translateY(1px); }

        .pez-sound-btn {
            align-self: flex-start;
            padding: 7px 18px;
            background: #b3e5fc;
            border: 2px solid #0288d1;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: #01579b;
        }
        .pez-sound-btn:hover:not(:disabled)  { transform: translateY(-1px); }
        .pez-sound-btn:active:not(:disabled) { transform: translateY(1px); }
        .pez-sound-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .pez-box.speaking {
            border-color: #f9a825;
            background: #fff9c4;
            box-shadow: 0 0 0 3px rgba(249,168,37,0.5);
        }

        /* Consonants & Vowels section */
        .pez-cv-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pez-cv-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .pez-cv-grid .pez-tile {
            min-width: unset;
            width: 100%;
        }

        .pez-divider {
            height: 2px;
            background: #ddd;
            border-radius: 2px;
            margin: 2px 0;
        }

        /* Bottom hot-pink section in left col */
        .pez-section-nolabel {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .pez-board {
                grid-template-columns: 1fr;
                margin: 12px;
                width: auto;
            }
        }

        @media (max-width: 600px) {
            .pez-tile {
                min-width: 44px;
                height: 44px;
                font-size: 0.9rem;
            }
            .pez-box {
                width: 44px;
                height: 44px;
                font-size: 0.85rem;
            }
            .pez-word-display {
                font-size: 1.3rem;
            }
        }

        #last-update-footnote {
            position: fixed;
            left: 10px;
            bottom: 8px;
            z-index: 20;
            font-size: 0.72rem;
            color: rgba(45, 55, 72, 0.78);
            background: rgba(255, 255, 255, 0.7);
            padding: 3px 8px;
            border-radius: 8px;
            pointer-events: none;
            backdrop-filter: blur(1px);
        }

        [data-theme="dark"] #last-update-footnote {
            color: rgba(247, 250, 252, 0.88);
            background: rgba(26, 32, 44, 0.6);
        }
    </style>
</head>
<body>

    <nav id="tab-nav">
        <button class="tab-btn" onclick="switchTab(this, 'blending')">Blending Board</button>
        <button class="tab-btn active" onclick="switchTab(this, 'pezzello')">Pezzello</button>
    </nav>

    <!-- =================== BLENDING BOARD TAB =================== -->
    <div id="tab-blending" class="tab-panel">

        <div id="sidebar">
            <h3 style="margin-top:0; padding-left:10px;">Category Controls</h3>
            <label class="control-label">
                <input type="checkbox" id="toggle-all" onchange="toggleAllCategories(this.checked)" checked class="cat-checkbox"> Include All
            </label>
            <hr style="width:90%; border:1px solid var(--tray-bg); margin: 10px auto;">
            <label class="control-label" style="background-color: var(--digraph-color);">
                <input type="checkbox" class="cat-checkbox" data-cat="digraph" onchange="updateTray()" checked> Digraphs
            </label>
            <label class="control-label" style="background-color: var(--r-controlled-color);">
                <input type="checkbox" class="cat-checkbox" data-cat="r-controlled" onchange="updateTray()" checked> R-Controlled
            </label>
            <label class="control-label" style="background-color: var(--vowel-team-color);">
                <input type="checkbox" class="cat-checkbox" data-cat="vowel-team" onchange="updateTray()" checked> Vowel Teams
            </label>
            <label class="control-label" style="background-color: var(--other-color); border: 2px solid #cbd5e0;">
                <input type="checkbox" class="cat-checkbox" data-cat="other" onchange="updateTray()" checked> Other Sounds
            </label>
            <label class="control-label" style="background: linear-gradient(90deg, var(--consonant-color) 0%, var(--vowel-color) 100%); color: #2d3748;">
                <input type="checkbox" class="cat-checkbox" data-cat="alphabet" onchange="updateTray()" checked> Consonants/Vowels
            </label>
        </div>

        <div id="main-container">
            <header>
                <h2 style="margin:0;">Blending Board</h2>
                <div style="display:flex; gap:10px;">
                    <button class="action-btn btn-toggle" onclick="toggleDots()">Toggle Dots</button>
                    <button class="action-btn btn-toggle" onclick="toggleTheme()">🌓 Theme</button>
                </div>
            </header>

            <div id="word-section">
                <!-- Selected tiles will appear here -->
            </div>

            <div id="controls">
                <div class="settings-bar">
                    Limit:
                    <select id="word-length" onchange="saveSettings()">
                        <option value="custom" selected>None</option>
                        <option value="1">1 Tile</option>
                        <option value="2">2 Tiles</option>
                        <option value="3">3 Tiles</option>
                        <option value="4">4 Tiles</option>
                        <option value="5">5 Tiles</option>
                    </select>
                </div>
                <div style="display:flex; gap: 10px; flex-wrap: wrap;">
                    <button class="action-btn btn-challenge" onclick="challengeMe()">Challenge Me</button>
                    <button class="action-btn btn-sound-out" onclick="soundOut()">Slow Sound Out</button>
                    <button class="action-btn btn-read-word" onclick="readWord()">Read Word</button>
                    <button class="action-btn btn-clear" onclick="clearWord()">Clear</button>
                </div>
            </div>

            <div id="tray-area">
                <!-- Tiles will be rendered here -->
            </div>
        </div>

        <div id="history-drawer" class="collapsed">
            <button class="toggle-history" onclick="toggleHistory()">📖</button>
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;">History</h3>
                <button class="action-btn btn-toggle" style="padding:5px 10px;" onclick="exportHistory()">💾</button>
            </div>
            <ul class="history-list" id="history-list"></ul>
        </div>

    </div><!-- end #tab-blending -->

    <!-- =================== PEZZELLO TAB =================== -->
    <div id="tab-pezzello" class="tab-panel active">

        <div class="pez-board" id="pez-board">

            <!-- LEFT COLUMN: phonics sections -->
            <div class="pez-left-col">

                <!-- 1. DIGRAPHS -->
                <div class="pez-section" id="pez-sec-digraphs"></div>

                <!-- 2. R-CONTROLLED VOWELS -->
                <div class="pez-section" id="pez-sec-rcontrol"></div>

                <!-- 3. VOWEL TEAMS -->
                <div class="pez-section" id="pez-sec-vowelteams"></div>

                <!-- 4. OTHER -->
                <div class="pez-section" id="pez-sec-other"></div>

                <!-- 5. BOTTOM ROW (hot-pink, no label) -->
                <div class="pez-section-nolabel" id="pez-sec-bottom"></div>

            </div>

            <!-- RIGHT COLUMN: My Word + Consonants & Vowels -->
            <div class="pez-right-col">

                <!-- My Word Builder -->
                <div class="pez-my-word">
                    <div class="pez-my-word-label">My Word</div>
                    <div class="pez-boxes-row" id="pez-boxes-row">
                        <div class="pez-box" id="pez-box-0"></div>
                        <div class="pez-box" id="pez-box-1"></div>
                        <div class="pez-box" id="pez-box-2"></div>
                        <div class="pez-box" id="pez-box-3"></div>
                        <div class="pez-box" id="pez-box-4"></div>
                        <div class="pez-box" id="pez-box-5"></div>
                    </div>
                    <div class="pez-arrow-row">
                        <div class="pez-arrow">&#8594;</div>
                        <div>
                            <div class="pez-word-display" id="pez-word-display"></div>
                            <div class="pez-phonetic-sub" id="pez-phonetic-sub"></div>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="pez-sound-btn" id="pez-sound-btn" onclick="pezSoundOut()">&#128266; Sound It Out</button>
                        <button class="pez-clear-btn" onclick="pezClearWord()">CLEAR</button>
                    </div>
                </div>

                <!-- Consonants and Vowels -->
                <div class="pez-cv-section">
                    <div class="pez-label pez-label-cv">Consonants and Vowels</div>
                    <div class="pez-cv-grid" id="pez-cv-grid"></div>
                    <div class="pez-divider"></div>
                    <!-- Special silent/blend row -->
                    <div class="pez-tiles-row" id="pez-special-row"></div>
                </div>

            </div>

        </div><!-- end .pez-board -->

    </div><!-- end #tab-pezzello -->

    <div id="last-update-footnote" aria-live="polite">Last update: --</div>

    <script>
        // =================== TAB SWITCHING ===================
        function switchTab(btn, tabName) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            btn.classList.add('active');
        }

        // =================== BLENDING BOARD JS (unchanged) ===================
        const sounds = {
            digraph: ['ch', 'sh', 'th', 'wh', 'ph', 'ck', 'kn', 'wr', 'gh', 'mb', 'gn'],
            'r-controlled': ['ar', 'er', 'ir', 'or', 'ur'],
            'vowel-team': ['ai', 'ay', 'au', 'aw', 'ee', 'ew', 'ea', 'ie', 'igh', 'ow', 'oa', 'oe', 'ou', 'oo', 'oi', 'ue', 'ui', 'oy', 'eigh', 'ey', 'ei'],
            other: ['dge', 'nk', 'ng', 'tch', 'qu', 'ff', 'll', 'ss', 'zz', 'ed', 'ing'],
            alphabet: ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n', 'o', 'p', 'q', 'r', 's', 't', 'u', 'v', 'w', 'x', 'y', 'z']
        };

        const phoneticMap = {
            'ch': 'ch', 'sh': 'sh', 'th': 'th', 'wh': 'wh', 'ph': 'f', 'ck': 'k', 'kn': 'n', 'wr': 'r', 'gh': 'g', 'mb': 'm', 'gn': 'n',
            'ar': 'ar', 'er': 'er', 'ir': 'er', 'or': 'or', 'ur': 'er',
            'ai': 'ay', 'ay': 'ay', 'au': 'aw', 'aw': 'aw', 'ee': 'ee', 'ew': 'oo', 'ea': 'ee', 'ie': 'eye', 'igh': 'eye', 'ow': 'ow', 'oa': 'oh', 'oe': 'oh', 'ou': 'ow', 'oo': 'oo', 'oi': 'oy', 'ue': 'oo', 'ui': 'oo', 'oy': 'oy', 'eigh': 'ay', 'ey': 'ee', 'ei': 'ay',
            'dge': 'edge', 'nk': 'ngk', 'ng': 'ng', 'tch': 'ch', 'qu': 'kwa', 'ff': 'f', 'll': 'l', 'ss': 's', 'zz': 'z', 'ed': 'ed', 'ing': 'ing'
        };

        const challengeWords = ['cat', 'ship', 'shop', 'fish', 'chat', 'path', 'duck', 'king', 'sing', 'book', 'moon', 'star', 'park', 'bird', 'coat', 'rain'];
        const UPLOADED_AUDIO_TILES = new Set(['ar', 'ch', 'er', 'ir', 'or', 'ph', 'sh', 'th', 'ur', 'wh']);

        let currentWord = [];
        let history = [];
        let showDots = true;
        const LAST_UPDATE_KEY = 'siteLastUpdateISO';

        function formatUpdateTimestamp(isoString) {
            const d = new Date(isoString);
            if (Number.isNaN(d.getTime())) return '--';
            return d.toLocaleString(undefined, {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function renderLastUpdate(isoString) {
            const el = document.getElementById('last-update-footnote');
            if (!el) return;
            el.textContent = 'Last update: ' + formatUpdateTimestamp(isoString);
        }

        function markSiteUpdated() {
            const isoNow = new Date().toISOString();
            localStorage.setItem(LAST_UPDATE_KEY, isoNow);
            renderLastUpdate(isoNow);
        }

        function updateTray(markUpdate = true) {
            const tray = document.getElementById('tray-area');
            tray.innerHTML = '';
            const categoryOrder = ['digraph', 'r-controlled', 'vowel-team', 'other', 'alphabet'];
            categoryOrder.forEach(cat => {
                const checkbox = document.querySelector(`.cat-checkbox[data-cat="${cat}"]`);
                if (checkbox && checkbox.checked) {
                    sounds[cat].forEach(sound => {
                        let type = cat;
                        if (cat === 'alphabet') {
                            type = ['a', 'e', 'i', 'o', 'u'].includes(sound) ? 'vowel' : 'consonant';
                        }
                        createTile(tray, sound, type);
                    });
                }
            });
            const checkboxes = document.querySelectorAll('.cat-checkbox:not(#toggle-all)');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            document.getElementById('toggle-all').checked = allChecked;
            if (markUpdate) markSiteUpdated();
        }

        function toggleAllCategories(checked) {
            document.querySelectorAll('.cat-checkbox').forEach(cb => {
                cb.checked = checked;
            });
            updateTray();
        }

        function createTile(container, sound, type) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.dataset.type = type;
            tile.textContent = sound;
            tile.onclick = () => addSound(sound, type);
            container.appendChild(tile);
        }

        function addSound(sound, type) {
            const maxLength = document.getElementById('word-length').value;
            if (maxLength !== 'custom' && currentWord.length >= parseInt(maxLength)) return;
            speakPhoneme(sound, 1.0);
            currentWord.push({ sound, type });
            updateWordSection();
            markSiteUpdated();
        }

        function removeSound(index) {
            currentWord.splice(index, 1);
            updateWordSection();
            markSiteUpdated();
        }

        function updateWordSection() {
            const section = document.getElementById('word-section');
            section.innerHTML = '';
            if (showDots) section.classList.add('show-dots');
            else section.classList.remove('show-dots');

            currentWord.forEach((item, index) => {
                const container = document.createElement('div');
                container.className = 'tile-container';
                const tile = document.createElement('div');
                tile.className = 'tile word-tile';
                tile.dataset.type = item.type;
                tile.textContent = item.sound;
                tile.onclick = () => removeSound(index);
                const dot = document.createElement('div');
                dot.className = 'blending-dot';
                container.appendChild(tile);
                container.appendChild(dot);
                section.appendChild(container);
            });
        }

        function clearWord() {
            if (currentWord.length > 0) {
                const wordString = currentWord.map(i => i.sound).join('');
                addToHistory(wordString);
            }
            currentWord = [];
            updateWordSection();
            markSiteUpdated();
        }

        function addToHistory(word) {
            if (!history.includes(word)) {
                history.unshift(word);
                const list = document.getElementById('history-list');
                const li = document.createElement('li');
                li.className = 'history-item';
                li.textContent = word;
                li.onclick = () => speakPhoneme(word, 1.0);
                list.prepend(li);
                markSiteUpdated();
            }
        }

        function exportHistory() {
            const text = history.join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'blending-board-history.txt';
            a.click();
        }

        function toggleDots() {
            showDots = !showDots;
            updateWordSection();
            markSiteUpdated();
        }

        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            markSiteUpdated();
        }

        function challengeMe() {
            const word = challengeWords[Math.floor(Math.random() * challengeWords.length)];
            speakPhoneme("Can you build the word " + word + "?", 0.9);
        }

        function saveSettings() {
            localStorage.setItem('wordLimit', document.getElementById('word-length').value);
            markSiteUpdated();
        }

        let preferredVoice = null;

        function initVoices() {
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.name.includes('Samantha')) ||
                             voices.find(v => v.name.includes('Google US English')) ||
                             voices.find(v => v.name.toLowerCase().includes('female')) ||
                             voices[0];
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = initVoices;
        }
        initVoices();

        function getPhoneticSound(text) {
            const lower = text.toLowerCase();
            return phoneticMap[lower] || text;
        }

        function playTileAudioOrFallback(tileText, rateOverride) {
            return new Promise(resolve => {
                const key = String(tileText || '').toLowerCase();
                let done = false;

                const finish = () => {
                    if (done) return;
                    done = true;
                    resolve();
                };

                const speakFallback = () => {
                    const soundToSpeak = getPhoneticSound(tileText);
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(soundToSpeak);
                    if (preferredVoice) utterance.voice = preferredVoice;
                    utterance.pitch = 0.9;
                    utterance.rate = rateOverride || 0.8;
                    utterance.onend = finish;
                    utterance.onerror = finish;
                    window.speechSynthesis.speak(utterance);
                };

                if (!UPLOADED_AUDIO_TILES.has(key)) {
                    speakFallback();
                    return;
                }

                const src = 'audio/' + key + '.mp3';
                const audio = new Audio(src);
                audio.addEventListener('ended', finish, { once: true });
                audio.addEventListener('error', finish, { once: true });

                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => {
                        finish();
                    });
                }
            });
        }

        function speakPhoneme(tileText, rateOverride) {
            playTileAudioOrFallback(tileText, rateOverride);
        }

        async function soundOut() {
            window.speechSynthesis.cancel();
            for (let i = 0; i < currentWord.length; i++) {
                await playTileAudioOrFallback(currentWord[i].sound, 0.4);
                if (i < currentWord.length - 1) await new Promise(r => setTimeout(r, 300));
            }
        }

        function readWord() {
            const fullWord = currentWord.map(i => i.sound).join('');
            speakPhoneme(fullWord, 0.8);
        }

        function toggleHistory() {
            document.getElementById('history-drawer').classList.toggle('collapsed');
        }

        // =================== PEZZELLO BOARD JS ===================

        const PEZ_MAX = 6;
        let pezWord = [];

        const pezVowelSet = new Set(['a', 'e', 'i', 'o', 'u']);

        const pezSections = [
            {
                containerId: 'pez-sec-digraphs',
                label: 'Digraphs',
                labelClass: 'pez-label-digraph',
                tiles: ['ch', 'sh', 'th', 'wh', 'ph'],
                tileClass: 'pez-t-digraph'
            },
            {
                containerId: 'pez-sec-rcontrol',
                label: 'R-Controlled Vowels',
                labelClass: 'pez-label-rcontrol',
                tiles: ['ar', 'er', 'ir', 'or', 'ur'],
                tileClass: 'pez-t-rcontrol'
            },
            {
                containerId: 'pez-sec-vowelteams',
                label: 'Vowel Teams',
                labelClass: 'pez-label-vowelteam',
                tiles: ['ai', 'ay', 'au', 'aw', 'ee', 'ew', 'ea', 'ie', 'igh', 'ow', 'oa', 'oe', 'ou', 'oo', 'oi', 'ue', 'ui'],
                tileClass: 'pez-t-vowelteam'
            },
            {
                containerId: 'pez-sec-other',
                label: 'Other',
                labelClass: 'pez-label-other',
                tiles: ['dge', 'nk', 'ng', 'tch', 'qu', 'ff', 'll', 'ss', 'zz', 'ed', 'ing'],
                tileClass: 'pez-t-other'
            }
        ];

        // Bottom hot-pink row (vowel team tiles, no label)
        const pezBottomTiles  = ['oy', 'eigh', 'ey', 'ei'];
        const pezAlphabet     = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const pezSpecial      = ['ck', 'kn', 'wr', 'gh', 'mb', 'gn'];

        function makePezTile(text, tileClass) {
            const el = document.createElement('div');
            el.className = 'pez-tile ' + tileClass;
            el.textContent = text;
            el.addEventListener('click', () => pezAddTile(text));
            return el;
        }

        function buildPezBoard() {
            // Labeled sections
            pezSections.forEach(sec => {
                const container = document.getElementById(sec.containerId);
                container.innerHTML = '';

                const lbl = document.createElement('div');
                lbl.className = 'pez-label ' + sec.labelClass;
                lbl.textContent = sec.label;
                container.appendChild(lbl);

                const row = document.createElement('div');
                row.className = 'pez-tiles-row';
                sec.tiles.forEach(t => row.appendChild(makePezTile(t, sec.tileClass)));
                container.appendChild(row);
            });

            // Bottom hot-pink row (no label)
            const bottomContainer = document.getElementById('pez-sec-bottom');
            bottomContainer.innerHTML = '';
            const bottomRow = document.createElement('div');
            bottomRow.className = 'pez-tiles-row';
            pezBottomTiles.forEach(t => bottomRow.appendChild(makePezTile(t, 'pez-t-vowelteam')));
            bottomContainer.appendChild(bottomRow);

            // a-z grid
            const cvGrid = document.getElementById('pez-cv-grid');
            cvGrid.innerHTML = '';
            pezAlphabet.forEach(letter => {
                const cls = pezVowelSet.has(letter) ? 'pez-t-vowel' : 'pez-t-consonant';
                cvGrid.appendChild(makePezTile(letter, cls));
            });

            // Special silent/blend row
            const specialRow = document.getElementById('pez-special-row');
            specialRow.innerHTML = '';
            pezSpecial.forEach(t => specialRow.appendChild(makePezTile(t, 'pez-t-digraph')));
        }

        const PHONETIC_SOUNDS = {
            ch: { label: "chuh", speak: "ch" }, sh: { label: "shhh", speak: "sh" }, th: { label: "thuh", speak: "th" }, wh: { label: "hwuh", speak: "wh" }, ph: { label: "fuh", speak: "f" },
            ar: { label: "ahr", speak: "ar" },  er: { label: "er", speak: "er" },   ir: { label: "er", speak: "er" },   or: { label: "or", speak: "or" },   ur: { label: "er", speak: "er" },
            ai: { label: "ay", speak: "ay" },  ay: { label: "ay", speak: "ay" },  au: { label: "aw", speak: "aw" },  aw: { label: "aw", speak: "aw" },  ee: { label: "ee", speak: "ee" },
            ew: { label: "yoo", speak: "yoo" }, ea: { label: "ee", speak: "ee" },  ie: { label: "eye", speak: "eye" }, igh: { label: "eye", speak: "eye" }, ow: { label: "ow", speak: "ow" },
            oa: { label: "oh", speak: "oh" },  oe: { label: "oh", speak: "oh" },  ou: { label: "ow", speak: "ow" },  oo: { label: "oo", speak: "oo" },  oi: { label: "oy", speak: "oy" },
            ue: { label: "yoo", speak: "yoo" }, ui: { label: "oo", speak: "oo" },
            dge: { label: "j", speak: "j" },  nk: { label: "ngk", speak: "ngk" }, ng: { label: "ng", speak: "ng" },  tch: { label: "t-ch", speak: "ch" }, qu: { label: "kwuh", speak: "kw" },
            ff: { label: "f", speak: "f" },   ll: { label: "l", speak: "l" },   ss: { label: "s", speak: "s" },   zz: { label: "z", speak: "z" },
            ed: { label: "duh", speak: "d" }, ing: { label: "ing", speak: "ing" },
            oy: { label: "oy", speak: "oy" },  eigh: { label: "ay", speak: "ay" }, ey: { label: "ee", speak: "ee" }, ei: { label: "ay", speak: "ay" },
            a: { label: "ah", speak: "a" },  b: { label: "buh", speak: "b" }, c: { label: "kuh", speak: "k" }, d: { label: "duh", speak: "d" }, e: { label: "eh", speak: "e" },
            f: { label: "fuh", speak: "f" }, g: { label: "guh", speak: "g" }, h: { label: "huh", speak: "h" }, i: { label: "ih", speak: "i" },  j: { label: "juh", speak: "j" },
            k: { label: "kuh", speak: "k" }, l: { label: "luh", speak: "l" }, m: { label: "muh", speak: "m" }, n: { label: "nuh", speak: "n" }, o: { label: "ah", speak: "o" },
            p: { label: "puh", speak: "p" }, q: { label: "kwuh", speak: "kw" }, r: { label: "ruh", speak: "r" }, s: { label: "sss", speak: "s" }, t: { label: "tuh", speak: "t" },
            u: { label: "uh", speak: "u" },  v: { label: "vuh", speak: "v" }, w: { label: "wuh", speak: "w" }, x: { label: "ks", speak: "ks" },  y: { label: "yuh", speak: "y" }, z: { label: "zuh", speak: "z" },
            ck: { label: "k", speak: "k" },  kn: { label: "n", speak: "n" },  wr: { label: "r", speak: "r" },  gh: { label: "silent", speak: "" }, mb: { label: "m", speak: "m" }, gn: { label: "n", speak: "n" }
        };

        function getSoundData(tile) {
            const fallback = { label: tile, speak: tile };
            if (!tile) return fallback;
            const data = PHONETIC_SOUNDS[tile.toLowerCase()];
            return data || fallback;
        }

        function getPhoneticLabel(tile) {
            return getSoundData(tile).label;
        }

        function getPhoneticSpeech(tile) {
            return getSoundData(tile).speak;
        }

        function pezSpeak(text, rate, pitch, volume) {
            return new Promise(resolve => {
                if (!text) { resolve(); return; }
                window.speechSynthesis.cancel();
                const utt = new SpeechSynthesisUtterance(text);
                utt.lang   = 'en-US';
                utt.rate   = rate;
                utt.pitch  = pitch;
                utt.volume = volume;
                if (preferredVoice) utt.voice = preferredVoice;
                utt.onend = () => resolve();
                utt.onerror = () => resolve();
                window.speechSynthesis.speak(utt);
            });
        }

        function pezDelay(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function pezPlayTileSound(tile) {
            return new Promise(resolve => {
                const key = String(tile || '').toLowerCase();
                let settled = false;

                const finish = () => {
                    if (settled) return;
                    settled = true;
                    resolve();
                };

                if (!UPLOADED_AUDIO_TILES.has(key)) {
                    const phoneticSpeech = getPhoneticSpeech(tile);
                    pezSpeak(phoneticSpeech, 0.7, 1.1, 1).then(finish);
                    return;
                }

                const src = 'audio/' + key + '.mp3';
                const audio = new Audio(src);
                audio.addEventListener('ended', finish, { once: true });
                audio.addEventListener('error', finish, { once: true });

                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => {
                        finish();
                    });
                }
            });
        }

        async function pezSoundOut() {
            if (pezWord.length === 0) return;
            const btn = document.getElementById('pez-sound-btn');
            btn.disabled = true;
            window.speechSynthesis.cancel();

            // Play each tile one by one, waiting for clip end and then 300ms.
            for (let i = 0; i < pezWord.length; i++) {
                const box = document.getElementById('pez-box-' + i);
                box.classList.add('speaking');
                await pezPlayTileSound(pezWord[i]);
                box.classList.remove('speaking');
                if (i < pezWord.length - 1) await pezDelay(300);
            }

            // Read the assembled word only when there is an actual multi-tile word.
            if (pezWord.length > 1) {
                await pezDelay(600);
                await pezSpeak(pezWord.join(''), 0.7, 1.1, 1);
            }

            btn.disabled = false;
        }

        function pezAddTile(text) {
            if (pezWord.length >= PEZ_MAX) return;
            pezWord.push(text);
            pezUpdateDisplay();
            markSiteUpdated();
        }

        function pezClearWord() {
            window.speechSynthesis.cancel();
            pezWord = [];
            pezUpdateDisplay();
            const btn = document.getElementById('pez-sound-btn');
            if (btn) btn.disabled = false;
            markSiteUpdated();
        }

        function pezUpdateDisplay() {
            for (let i = 0; i < PEZ_MAX; i++) {
                const box = document.getElementById('pez-box-' + i);
                const val = pezWord[i] || '';
                box.textContent = val;
                box.classList.toggle('filled', val !== '');
            }
            document.getElementById('pez-word-display').textContent = pezWord.join('');
            // Show space-separated phonetic sounds as a subtitle
            document.getElementById('pez-phonetic-sub').textContent =
                pezWord.map(getPhoneticLabel).join('  ');
        }

        // =================== INIT ===================
        window.onload = () => {
            const savedLimit = localStorage.getItem('wordLimit');
            if (savedLimit) document.getElementById('word-length').value = savedLimit;

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) document.body.setAttribute('data-theme', savedTheme);

            const lastUpdateISO = localStorage.getItem(LAST_UPDATE_KEY);
            if (lastUpdateISO) renderLastUpdate(lastUpdateISO);
            else markSiteUpdated();

            updateTray(false);
            buildPezBoard();
        };
    </script>
</body>
</html>
